// SUPABASE CORRIGIDO
// ══════════════════════════════════════════════════════
const SB_URL = 'https://qbbjdhhpeywfkyzdvdlx.supabase.co';
const SB_KEY = 'sb_publishable_oksO0hIClVWlSSmPd99HXA_gNIWGD1E';

const sbHeaders = {
  'apikey': SB_KEY,
  'Authorization': `Bearer ${SB_KEY}`,
  'Content-Type': 'application/json'
};

async function sbGet(key){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/app_data?key=eq.${key}&select=value`, {headers: sbHeaders});
    if(!r.ok){
      console.error('Erro GET:', key, r.status);
      return null;
    }
    const d = await r.json();
    return d.length ? d[0].value : null;
  }catch(e){
    console.error('Falha GET:', key, e);
    return null;
  }
}

async function sbSet(key, value){
  try{
    await fetch(`${SB_URL}/rest/v1/app_data`, {
      method: 'POST',
      headers: {...sbHeaders, 'Prefer': 'resolution=merge-duplicates'},
      body: JSON.stringify({
        key,
        value,
        updated_at: new Date().toISOString()
      })
    });
  }catch(e){
    console.error('Erro SET:', key, e);
  }
}

// LOAD GLOBAL
async function loadGlobalData(){
  const [c, td, o, u, p] = await Promise.all([
    sbGet('checks'),
    sbGet('taskDates'),
    sbGet('obs'),
    sbGet('users'),
    sbGet('pendingUsers')
  ]);

  if(c) checks = c;
  if(td) taskDates = td;
  if(o) obs = o;
  if(u) users = u;
  if(p) pendingUsers = p;
}

// LOAD SESSÕES
async function loadSessions(){
  if(!currentUser){
    sessions = [];
    return;
  }

  if(isAdmin()){
    const ativos = users.filter(u=>u.active);

    const results = await Promise.all(
      ativos.map(u => sbGet('sessions_' + u.username))
    );

    sessions = [];
    results.forEach(r=>{
      if(Array.isArray(r)) sessions.push(...r);
    });

  } else {
    const mine = await sbGet('sessions_' + currentUser.username);
    sessions = Array.isArray(mine) ? mine : [];
  }

  sessions.sort((a,b)=>a.date.localeCompare(b.date));
}

// SAVE
async function saveSessionsOnly(){
  if(!currentUser) return;

  setSyncing('saving');

  try{
    const mySessions = sessions.filter(s =>
      s.username === currentUser.username ||
      (!s.username && s.person === currentUser.name)
    );

    mySessions.forEach(s=>{
      if(!s.username) s.username = currentUser.username;
    });

    await sbSet('sessions_' + currentUser.username, mySessions);

    setSyncing('ok');

  }catch(e){
    setSyncing('err');
  }
}

// INIT CORRIGIDO
document.addEventListener('DOMContentLoaded', async () => {

  showLoading('Conectando ao banco de dados...');

  await loadGlobalData();

  document.getElementById('db-status').textContent = '● Conectado';
  document.getElementById('db-status').classList.add('ok');

  hideLoading();
  showLogin();
});

async function loginSuccess(user){

  currentUser = user;

  sessionStorage.setItem('s04_session', JSON.stringify({
    username: user.username
  }));

  showLoading('Carregando dados...');

  await loadSessions();

  hideLoading();

  const pcfg2 = userCfg(user.name);

  document.getElementById('top-avatar').style.cssText =
    `background:${pcfg2.bg};color:${pcfg2.tc}`;

  document.getElementById('top-avatar').textContent =
    user.name.slice(0,2).toUpperCase();

  document.getElementById('top-name').textContent = user.name;

  document.getElementById('top-admin-badge').style.display =
    isAdmin() ? 'inline-block' : 'none';

  document.getElementById('tab-relatorio').style.display = isAdmin() ? '' : 'none';
  document.getElementById('tab-colaborador').style.display = isAdmin() ? '' : 'none';
  document.getElementById('tab-admin').style.display = isAdmin() ? '' : 'none';

  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  renderAll();
}
