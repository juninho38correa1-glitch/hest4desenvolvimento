<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Horas</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
.box{max-width:400px;margin:80px auto;background:#fff;padding:20px;border-radius:10px}
input{width:100%;height:40px;margin-bottom:10px;padding:8px}
button{width:100%;height:40px;background:#222;color:#fff;border:none}
.loading{position:fixed;inset:0;background:#fff;display:flex;align-items:center;justify-content:center}
</style>
</head>

<body>

<div id="loading" class="loading">Conectando...</div>

<div id="login" class="box" style="display:none">
  <h3>Login</h3>
  <input id="user" placeholder="usuario">
  <input id="pass" type="password" placeholder="senha">
  <button onclick="login()">Entrar</button>
</div>

<div id="app" class="box" style="display:none">
  <h3 id="nome"></h3>
  <button onclick="logout()">Sair</button>
</div>

<script>
// ==========================
// CONFIG
// ==========================
const SB_URL = 'https://qbbjdhhpeywfkyzdvdlx.supabase.co';
const SB_KEY = 'sb_publishable_oksO0hIClVWlSSmPd99HXA_gNIWGD1E';

const headers = {
  apikey: SB_KEY,
  Authorization: 'Bearer ' + SB_KEY,
  'Content-Type': 'application/json'
};

// ==========================
// BASE
// ==========================
async function getData(key){
  try{
    const r = await fetch(`${SB_URL}/rest/v1/app_data?key=eq.${key}&select=value`,{headers});
    const d = await r.json();
    return d.length ? d[0].value : null;
  }catch(e){
    console.error(e);
    return null;
  }
}

// ==========================
// INIT
// ==========================
let users = [];

document.addEventListener('DOMContentLoaded', async ()=>{
  users = await getData('users') || [];

  document.getElementById('loading').style.display='none';
  document.getElementById('login').style.display='block';
});

// ==========================
// LOGIN
// ==========================
function login(){
  const u = document.getElementById('user').value.toLowerCase();
  const p = btoa(document.getElementById('pass').value);

  const user = users.find(x=>x.username===u && x.password===p);

  if(!user){
    alert('login inválido');
    return;
  }

  document.getElementById('login').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('nome').innerText=user.name;
}

// ==========================
function logout(){
  location.reload();
}
</script>

</body>
</html>
